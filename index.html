<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050505">
<title>Portal Jaime Barbosa · AUNADS AGENCIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login-view">
  <div class="login-box">
    <div class="login-logo"><img src="assets/logo-agencia.png" alt="AUNADS AGENCIA"></div>
    <div class="login-title">AUNADS AGENCIA</div>
    <div class="login-sub">Portal de Jaime Barbosa</div>
    <form id="login-form">
      <div class="field" style="text-align:left">
        <label>Correo</label>
        <input type="email" id="login-email" required autocomplete="username">
      </div>
      <div class="field" style="text-align:left">
        <label>Contraseña</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="login-btn">Entrar</button>
      <div class="login-error" id="login-error"></div>
    </form>
    <div style="margin-top:16px">
      <a href="#" id="forgot-link" style="font-size:12px;color:var(--muted);text-decoration:underline">¿Olvidaste tu contraseña?</a>
    </div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app-view" class="hidden">
  <aside class="sidebar">
    <div class="sb-brand">
      <img src="assets/logo-agencia.png" alt="">
      <div class="sb-brand-text">AUNADS<br>AGENCIA</div>
    </div>
    <nav class="sb-nav" id="sb-nav">
      <button class="sb-link active" data-view="resumen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        Resumen
      </button>
      <button class="sb-link" data-view="metricas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 19V9M11 19V4M18 19v-7" stroke-linecap="round"/></svg>
        Métricas mensuales
      </button>
      <button class="sb-link" data-view="pagos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M9 9.5c0-1.4 1.3-2.3 3-2.3s3 .8 3 2.1c0 3-6 1.4-6 4.4 0 1.3 1.3 2.1 3 2.1s3-.9 3-2.3" stroke-linecap="round"/></svg>
        Pagos
      </button>
      <button class="sb-link" data-view="tareas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 12l2.5 2.5L16 9" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Pendientes
      </button>
      <button class="sb-link" data-view="ventas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 12l5-5 4 4 8-8M20 3h-6v6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Ventas
      </button>
    </nav>
    <div class="sb-foot">
      <div class="sb-user">Sesión activa<b id="sb-user-name">—</b></div>
      <button class="btn-ghost" id="logout-btn" style="width:100%">Cerrar sesión</button>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="spin"></div>
  </main>
</div>

<!-- ===================== MODAL GENÉRICO (formularios) ===================== -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal-box"></div>
</div>

<!-- ===================== MODAL DE VIDEO ===================== -->
<div class="vmodal-bg" id="vmodal-bg">
  <div class="vmodal-box" id="vmodal-box">
    <div class="vmodal-close" id="vmodal-close"><svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></div>
    <div id="vmodal-content"></div>
  </div>
</div>

<!-- ===================== LIGHTBOX DE IMAGEN (recibos) ===================== -->
<div class="imglightbox-bg" id="imglightbox-bg">
  <img id="imglightbox-img" src="" alt="">
</div>

<script async defer src="https://www.instagram.com/embed.js"></script>

<script src="firebase-config.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
